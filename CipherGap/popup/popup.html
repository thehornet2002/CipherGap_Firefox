<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8" />

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    />

    <title>CipherGap</title>

    <link
        rel="stylesheet"
        href="style.css"
    />
<script type="module" src="./popup.js"></script>
</head>

<body>

    <div class="app">

        <!-- Header -->

        <div class="topbar">

            <div class="brand">

                <div class="brand-logo">
                    🔐
                </div>

                <div>

                    <div class="brand-title">
                        CipherGap
                    </div>

                    <div class="brand-subtitle">
                        Secure Messaging Layer
                    </div>

                </div>

            </div>

            <div class="version">
                v1.0
            </div>

        </div>


        <!-- Messenger Tabs -->

        <div class="messenger-tabs">

            <!-- Bale -->

            <button
                class="messenger-card active"
            >

                <div class="messenger-top">

                    <div class="messenger-icon bale">
                        🟦
                    </div>

                    <div class="messenger-info">

                        <div class="messenger-name">
                            Bale
                        </div>

                        <div class="messenger-status online">
                            Active
                        </div>

                    </div>

                </div>

            </button>


            <!-- Rubika -->

            <button
                class="messenger-card disabled"
            >

                <div class="messenger-top">

                    <div class="messenger-icon rubika">
                        🟩
                    </div>

                    <div class="messenger-info">

                        <div class="messenger-name">
                            Rubika
                        </div>

                        <div class="messenger-status offline">
                            Disabled
                        </div>

                    </div>

                </div>

            </button>


            <!-- Eitaa -->

            <button
                class="messenger-card disabled"
            >

                <div class="messenger-top">

                    <div class="messenger-icon eitaa">
                        🟨
                    </div>

                    <div class="messenger-info">

                        <div class="messenger-name">
                            Eitaa
                        </div>

                        <div class="messenger-status offline">
                            Disabled
                        </div>

                    </div>

                </div>

            </button>


            <!-- Splus -->

            <button
                class="messenger-card disabled"
            >

                <div class="messenger-top">

                    <div class="messenger-icon splus">
                        🟪
                    </div>

                    <div class="messenger-info">

                        <div class="messenger-name">
                            Splus
                        </div>

                        <div class="messenger-status offline">
                            Disabled
                        </div>

                    </div>

                </div>

            </button>

        </div>


      <div class="top-row">

          <!-- Current Chat -->
          <div class="glass-card flex-card">

              <div class="section-label">
                  Current Chat
              </div>

              <div
                  id="siteName"
                  class="chat-id"
              >
                  web.bale.ai/chat?uid=26564777
              </div>

          </div>


          <!-- Key State -->
          <div
              id="savedState"
              class="glass-card flex-card"
          >

              <div class="key-header">

                  <span>
                      Encryption Key
                  </span>

                  <div class="badge">
                      ACTIVE
                  </div>

              </div>

              <div
                  id="savedKey"
                  class="saved-key"
              >
                  my-super-secret-key
              </div>

          </div>

      </div>

        <!-- Form -->

        <div class="glass-card">

            <div class="section-label">
                Secret Key
            </div>

            <input
                id="secretKey"
                class="input"
                type="password"
                placeholder="Enter encryption key..."
            />

            <button
                id="saveBtn"
                class="save-btn"
            >
                Save Key
            </button>

        </div>


        <!-- Status -->

        <div
            id="status"
            class="status"
        >
            ✅ Key saved successfully
        </div>


        <!-- Footer -->

        <div class="footer">

            Made with ❤️ and ☕ by

            <a
                href="https://ali-sharify.ir"
                target="_blank"
            >
                Ali Sharify
            </a>

        </div>

    </div>

</body>

</html>
